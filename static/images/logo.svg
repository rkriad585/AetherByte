<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        AETHERBYTE LOGO
        Concept: Industrial Bridge + Processing Core
        Style: Nothing OS / Dot Matrix
    -->
    
    <!-- 1. CONTAINER: The Chip -->
    <!-- Dark void background with subtle industrial stroke -->
    <rect x="16" y="16" width="480" height="480" rx="128" fill="#050505" stroke="#333333" stroke-width="16"/>
    
    <!-- 2. THE STRUCTURE: Abstract 'A' -->
    <!-- Represents the sturdy, logic-based infrastructure -->
    <g fill="#EAEAEA">
        <!-- Left Pillar -->
        <rect x="128" y="128" width="64" height="256" rx="32"/>
        <!-- Right Pillar -->
        <rect x="320" y="128" width="64" height="256" rx="32"/>
        <!-- Top Bridge -->
        <rect x="128" y="128" width="256" height="64" rx="32"/>
    </g>

    <!-- 3. THE CORE: The Byte -->
    <!-- The signature 'Nothing Red' dot representing active execution -->
    <circle cx="256" cy="288" r="48" fill="#EB0029"/>
    
</svg>
