<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}AetherByte{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- CodeMirror (The Editor Engine) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/abbott.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/mode/simple.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}?v=2">
    
    <style>
        :root {
            --bg-deep: #050505;
            --accent-red: #EB0029;
            --glass-panel: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #EAEAEA;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* --- GLASS UI --- */
        .glass-card {
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-tech { font-family: 'DotGothic16', sans-serif; }

        /* --- BUTTONS --- */
        .btn-action {
            background: #fff;
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.96); }

        .btn-accent {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 4px 20px rgba(235, 0, 41, 0.4);
        }

        .rotate-180 { transform: rotate(180deg); }
        .transition-transform { transition: transform 0.3s ease; }
        
        .grid-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Simple slide up animation for mobile feel */
        @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
        }
        .slide-up-animation { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }


        @media (max-width: 1024px) {
            .glass-card { margin-bottom: 1rem; }
            .line-numbers { display: none; } 
            textarea { padding-left: 1rem !important; }
        }
        
        /* --- CODEMIRROR CUSTOMIZATION --- */
.CodeMirror {
    height: 100% !important;
    background: transparent !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 14px;
    color: #a0a0a0;
    line-height: 1.6;
}

/* The Gutter (Line Numbers Background) */
.CodeMirror-gutters {
    background: rgba(0, 0, 0, 0.2) !important;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
}

/* Line Number Color */
.CodeMirror-linenumber {
    color: #444 !important;
}

/* cursor color */
.CodeMirror-cursor {
    border-left: 2px solid #EB0029 !important; /* Nothing Red */
}

/* Selected text */
.CodeMirror-selected {
    background: rgba(255, 255, 255, 0.1) !important;
}

/* SYNTAX COLORS (NaturalScript Theme) */
.cm-keyword { color: #EB0029 !important; font-weight: bold; } /* set, print */
.cm-operator { color: #fff !important; } /* to, from, by */
.cm-number { color: #00bcd4 !important; } /* 123 */
.cm-string { color: #4ade80 !important; } /* "hello" */
.cm-comment { color: #555 !important; font-style: italic; } /* # comments */
.cm-system { color: #fbbf24 !important; font-weight: bold; } /* alert, clear */

/* BINARY HIGHLIGHTING (Output Panel) */
.bin-op { color: #EB0029; font-weight: bold; } /* First 8 bits */
.bin-data { color: #555; } /* The rest */

    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="grid-bg"></div>

    <!-- NAVBAR -->
    <nav class="sticky shrink-0 top-0 w-full h-16 border-b border-white/10 flex items-center justify-between px-4 lg:px-10 bg-black/80 backdrop-blur-xl z-50">
        <div class="flex items-center gap-4">
            <!-- Navbar Logo Section -->
            <div class="flex items-center gap-3">
                <!-- Logo Icon -->
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="AetherByte Logo" class="w-10 h-10 shadow-[0_0_15px_rgba(255,255,255,0.1)] rounded-xl">
                
                <!-- Text -->
                <span class="text-lg font-bold tracking-tight text-white">AetherByte</span>
            </div>
        </div>
        <!-- 
    DESKTOP TOOLBAR (File Ops + Run) 
    1. Upload Icon
    2. Download Icon
    3. Divider
    4. Run System Button
-->
<div class="hidden md:flex items-center gap-3 mr-6">
    
    <!-- SHARE ICON (New) -->
    <button onclick="openShareModal()" class="p-2 text-blue-400 hover:text-blue-300 transition-colors rounded-lg hover:bg-blue-500/10" title="Share Project">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
    </button>
    
    <!-- SETTINGS ICON (New) -->
    <a href="/settings" class="p-2 text-gray-500 hover:text-white transition-colors rounded-lg hover:bg-white/5" title="Settings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    </a>
    
    <!-- UPLOAD ICON -->
    <button onclick="document.getElementById('navFileUpload').click()" class="p-2 text-gray-500 hover:text-white transition-colors rounded-lg hover:bg-white/5" title="Upload File">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
        </svg>
    </button>

    <!-- DOWNLOAD ICON -->
    <button onclick="downloadCode()" class="p-2 text-gray-500 hover:text-white transition-colors rounded-lg hover:bg-white/5" title="Download Code">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
    </button>

    <!-- Vertical Divider -->
    <div class="w-px h-6 bg-white/10 mx-2"></div>

    <!-- RUN BUTTON (Existing) -->
    <button onclick="runAllSequence()" class="flex items-center gap-2 bg-green-500/10 hover:bg-green-500/20 text-green-500 border border-green-500/50 px-4 py-1.5 rounded-full transition-all active:scale-95 group">
        <svg class="w-4 h-4 fill-current group-hover:scale-110 transition-transform" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <span class="text-xs font-bold tracking-widest font-mono">RUN SYSTEM</span>
    </button>
</div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-[10px] font-mono text-gray-400">ONLINE</span>
        </div>
    </nav>

    <!-- CONTENT INJECTION -->
    {% block content %}{% endblock %}

    <footer class="lg:hidden text-center py-6 text-[10px] text-gray-600 font-mono">
        AetherByte By RK - Made with ❤️
    </footer>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
